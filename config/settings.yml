  - name: "tylenol_internal_api"
    url: "https://internal-api.tylenol.com/v1/dist/auth"
    timeout: 45
    method: "POST"
    x_api_token: "kenvue_tyl_test_8f92a3b1c4d5e6f7a8b9c0"
    
    # Direct DB access for the Tylenol product catalog sync
  - name: "apac_warehouse_beta"
